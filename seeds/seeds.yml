version: 2

seeds:
  - name: diamonds
    description: "ggplot2::diamonds dataset — prices and attributes of ~54,000 round-cut diamonds."
    config:
      column_types:
        carat: DOUBLE
        cut: "ENUM('Fair', 'Good', 'Very Good', 'Premium', 'Ideal')"
        color: "ENUM('D', 'E', 'F', 'G', 'H', 'I', 'J')"
        clarity: "ENUM('I1', 'SI2', 'SI1', 'VS2', 'VS1', 'VVS2', 'VVS1', 'IF')"
        depth: DOUBLE
        table: DOUBLE
        price: INTEGER
        x: DOUBLE
        y: DOUBLE
        z: DOUBLE
    columns:
      - name: carat
        description: "Weight of the diamond (0.2–5.01)"
      - name: cut
        description: "Quality of the cut (Fair, Good, Very Good, Premium, Ideal)"
      - name: color
        description: "Diamond colour, from D (best) to J (worst)"
      - name: clarity
        description: "A measurement of how clear the diamond is (I1 (worst), SI2, SI1, VS2, VS1, VVS2, VVS1, IF (best))"
      - name: depth
        description: "Total depth percentage = z / mean(x, y) = 2 * z / (x + y) (43–79)"
      - name: table
        description: "Width of top of diamond relative to widest point (43–95)"
      - name: price
        description: "Price in US dollars ($326–$18,823)"
      - name: x
        description: "Length in mm (0–10.74)"
      - name: y
        description: "Width in mm (0–58.9)"
      - name: z
        description: "Depth in mm (0–31.8)"
