name: Build and deploy dbt project

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt-duckdb
        run: pip install dbt-duckdb==1.9.2

      - name: Build dbt project
        run: |
          cat > profiles.yml <<'PROFILES'
          example_data:
            outputs:
              dev:
                type: duckdb
                path: dev.duckdb
                threads: 1
            target: dev
          PROFILES
          dbt build --profiles-dir .
          dbt docs generate --profiles-dir .

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/

      - name: Upload database as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp dev.duckdb example_data.duckdb
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest example_data.duckdb \
            --title "Latest database build" \
            --notes "Built from commit ${{ github.sha }}" \
            --latest

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
